<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        :root {
            --space-bg: #0b0c10;
            --neon-blue: #45f3ff;
            --neon-purple: #b026ff;
            --glass-bg: rgba(15, 20, 30, 0.6);
            --glass-border: rgba(69, 243, 255, 0.2);
            --text-main: #e0e6ed;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(69, 243, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
            position: relative;
            z-index: 1;
        }

        /* Starry Background Animation */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><circle cx="150" cy="150" r="1.5" fill="%23FFF" opacity="0.6"/><circle cx="500" cy="800" r="1.5" fill="%23FFF" opacity="0.4"/><circle cx="850" cy="350" r="2" fill="%23FFF" opacity="0.8"/><circle cx="450" cy="250" r="1" fill="%23FFF" opacity="0.5"/><circle cx="800" cy="800" r="1" fill="%23FFF" opacity="0.3"/></svg>') repeat;
            animation: rotateStars 150s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes rotateStars {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .container {
            max-width: 700px;
            width: 90%;
            margin: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(69, 243, 255, 0.1),
                inset 0 0 20px rgba(176, 38, 255, 0.05);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.8em;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .matchup {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            padding: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .team-name {
            font-weight: 700;
            color: #fff;
            font-size: 1.2em;
        }

        .vs {
            font-size: 1.8em;
            color: var(--neon-blue);
            font-weight: 800;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
            margin: 0 15px;
        }

        .result {
            font-size: 1.5em;
            margin: 30px 0;
            padding: 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(176, 38, 255, 0.4);
            color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(176, 38, 255, 0.2);
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            from {
                box-shadow: 0 0 15px rgba(176, 38, 255, 0.2);
            }

            to {
                box-shadow: 0 0 30px rgba(176, 38, 255, 0.4);
            }
        }

        .winner {
            font-weight: 800;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
            display: inline-block;
            margin-top: 10px;
            font-size: 1.3em;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(176, 38, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(176, 38, 255, 0.5);
        }

        a:hover::before {
            left: 100%;
        }

        .prob-bars {
            display: flex;
            gap: 25px;
            margin: 35px 0;
        }

        .prob-bar {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bar-label {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1em;
            color: #a0aec0;
        }

        .bar-container {
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🏆 Prediction Result</h1>
        <div class="matchup">
            <div class="team">
                <img src="{{ team_info[home_team].logo }}" alt="{{ team_info[home_team].name }} Logo">
                <div class="team-name">{{ team_info[home_team].name }}</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <img src="{{ team_info[away_team].logo }}" alt="{{ team_info[away_team].name }} Logo">
                <div class="team-name">{{ team_info[away_team].name }}</div>
            </div>
        </div>
        <div class="result">
            Predicted Winner: <span class="winner">{{ team_info[winner].name }}</span><br>
            Confidence: {{ confidence }}%
        </div>
        <div class="prob-bars">
            <div class="prob-bar">
                <div class="bar-label">{{ team_info[home_team].name }}</div>
                <div class="bar-container">
                    <div class="bar-fill" style="width: {{ home_prob }}%;">{{ home_prob }}%</div>
                </div>
            </div>
            <div class="prob-bar">
                <div class="bar-label">{{ team_info[away_team].name }}</div>
                <div class="bar-container">
                    <div class="bar-fill" style="width: {{ away_prob }}%;">{{ away_prob }}%</div>
                </div>
            </div>
        </div>
        <a href="/">🔄 Make Another Prediction</a>
    </div>
</body>

</html>
