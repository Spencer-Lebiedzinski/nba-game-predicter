<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            max-width: 700px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .matchup {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team img {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            border-radius: 50%;
        }
        .team-name {
            font-weight: bold;
            color: #333;
        }
        .vs {
            font-size: 1.5em;
            color: #666;
        }
        .result {
            font-size: 1.5em;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border-radius: 10px;
            animation: bounceIn 0.6s ease-out;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .winner {
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        a {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .prob-bars {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .prob-bar {
            flex: 1;
        }
        .bar-label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .bar-container {
            height: 30px;
            background: #eee;
            border-radius: 15px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(45deg, #28a745, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Prediction Result</h1>
        <div class="matchup">
            <div class="team">
                <img src="{{ team_info[home_team].logo }}" alt="{{ team_info[home_team].name }} Logo">
                <div class="team-name">{{ team_info[home_team].name }}</div>
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <img src="{{ team_info[away_team].logo }}" alt="{{ team_info[away_team].name }} Logo">
                <div class="team-name">{{ team_info[away_team].name }}</div>
            </div>
        </div>
        <div class="result">
            Predicted Winner: <span class="winner">{{ team_info[winner].name }}</span><br>
            Confidence: {{ confidence }}%
        </div>
        <div class="prob-bars">
            <div class="prob-bar">
                <div class="bar-label">{{ team_info[home_team].name }}</div>
                <div class="bar-container">
                    <div class="bar-fill" style="width: {{ home_prob }}%;">{{ home_prob }}%</div>
                </div>
            </div>
            <div class="prob-bar">
                <div class="bar-label">{{ team_info[away_team].name }}</div>
                <div class="bar-container">
                    <div class="bar-fill" style="width: {{ away_prob }}%;">{{ away_prob }}%</div>
                </div>
            </div>
        </div>
        <a href="/">🔄 Make Another Prediction</a>
    </div>
</body>
</html>
