<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Game Predictor</title>
    <style>
        :root {
            --space-bg: #0b0c10;
            --neon-blue: #45f3ff;
            --neon-purple: #b026ff;
            --glass-bg: rgba(15, 20, 30, 0.6);
            --glass-border: rgba(69, 243, 255, 0.2);
            --text-main: #e0e6ed;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--space-bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(69, 243, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.15) 0%, transparent 50%);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Starry Background Animation */
        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .stars::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><circle cx="150" cy="150" r="1.5" fill="%23FFF" opacity="0.6"/><circle cx="500" cy="800" r="1.5" fill="%23FFF" opacity="0.4"/><circle cx="850" cy="350" r="2" fill="%23FFF" opacity="0.8"/><circle cx="450" cy="250" r="1" fill="%23FFF" opacity="0.5"/><circle cx="800" cy="800" r="1" fill="%23FFF" opacity="0.3"/></svg>') repeat;
            animation: rotateStars 150s linear infinite;
        }

        @keyframes rotateStars {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            max-width: 650px;
            width: 90%;
            margin: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(69, 243, 255, 0.1),
                        inset 0 0 20px rgba(176, 38, 255, 0.05);
            text-align: center;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            margin-bottom: 20px;
        }
        
        .logo-container img {
            width: 120px;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(69, 243, 255, 0.4);
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 20px rgba(69, 243, 255, 0.3); }
            to { box-shadow: 0 0 40px rgba(176, 38, 255, 0.5); }
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.8em;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: #a0aec0;
            margin-bottom: 35px;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .links-row {
            margin-bottom: 30px;
        }

        .nav-btn {
            display: inline-block;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--neon-blue);
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            border: 1px solid rgba(69, 243, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.1);
        }

        .nav-btn:hover {
            background: rgba(69, 243, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.3);
            transform: translateY(-2px);
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .team-select {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 420px;
        }

        .team-select:focus-within, .team-select:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(176, 38, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .team-select img {
            width: 44px;
            height: 44px;
            margin-right: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
        }

        select {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 1.05em;
            color: #fff;
            outline: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        select option {
            background: #0f141e;
            color: #fff;
            padding: 10px;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 16px 40px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.25em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(176, 38, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(176, 38, 255, 0.5);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div class="container">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AstroHoops Logo">
        </div>
        
        <h1>AstroHoops</h1>
        <p>AI-Powered NBA Game Predictions using machine learning and live predictive market odds.</p>
        
        <div class="links-row">
            <a href="/upcoming" class="nav-btn">
                <span>🛰️ View Upcoming Matches</span>
            </a>
        </div>
        
        <form action="/predict" method="post">
            <div class="team-select">
                <img id="home-logo" src="" alt="" style="display: none;">
                <select name="home_team" id="home_team" required onchange="updateLogo('home_team', 'home-logo')">
                    <option value="" disabled selected>Select Home Team</option>
                    {% for abbr, info in team_info.items() %}
                    <option value="{{ abbr }}">{{ info.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="team-select">
                <img id="away-logo" src="" alt="" style="display: none;">
                <select name="away_team" id="away_team" required onchange="updateLogo('away_team', 'away-logo')">
                    <option value="" disabled selected>Select Away Team</option>
                    {% for abbr, info in team_info.items() %}
                    <option value="{{ abbr }}">{{ info.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="submit-btn">Initialize Prediction 🚀</button>
        </form>
    </div>

    <script>
        const teamInfo = {{ team_info|tojson }};

        function updateLogo(selectId, imgId) {
            const select = document.getElementById(selectId);
            const img = document.getElementById(imgId);
            const selectedValue = select.value;
            if (selectedValue && teamInfo[selectedValue]) {
                img.src = teamInfo[selectedValue].logo;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
    </script>
</body>
</html>
