<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Game Predictor</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            max-width: 700px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-select {
            display: flex;
            align-items: center;
            margin: 15px 0;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 400px;
        }
        .team-select:hover {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        .team-select img {
            width: 40px;
            height: 40px;
            margin-right: 10px;
            border-radius: 50%;
        }
        select {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-size: 1em;
            outline: none;
        }
        button {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 NBA Game Predictor</h1>
        <p>Select the home and away teams to predict the winner based on historical performance!</p>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="/upcoming" style="display: inline-block; padding: 10px 20px; background: white; color: #667eea; text-decoration: none; border-radius: 20px; font-weight: bold; transition: all 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                📅 View Upcoming Games
            </a>
        </div>
        
        <form action="/predict" method="post">
            <div class="team-select">
                <img id="home-logo" src="" alt="Home Team Logo" style="display: none;">
                <select name="home_team" id="home_team" required onchange="updateLogo('home_team', 'home-logo')">
                    <option value="">-- Select Home Team --</option>
                    {% for abbr, info in team_info.items() %}
                    <option value="{{ abbr }}">{{ info.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="team-select">
                <img id="away-logo" src="" alt="Away Team Logo" style="display: none;">
                <select name="away_team" id="away_team" required onchange="updateLogo('away_team', 'away-logo')">
                    <option value="">-- Select Away Team --</option>
                    {% for abbr, info in team_info.items() %}
                    <option value="{{ abbr }}">{{ info.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">🔮 Predict Winner</button>
        </form>
    </div>

    <script>
        const teamInfo = {{ team_info|tojson }};

        function updateLogo(selectId, imgId) {
            const select = document.getElementById(selectId);
            const img = document.getElementById(imgId);
            const selectedValue = select.value;
            if (selectedValue && teamInfo[selectedValue]) {
                img.src = teamInfo[selectedValue].logo;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
    </script>
</body>
</html>
